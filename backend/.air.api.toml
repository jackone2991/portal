# air — hot reload for cmd/api during local dev.
# Install: go install github.com/air-verse/air@latest

root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/api ./cmd/api"
  bin = "./tmp/api"
  delay = 500
  exclude_dir = ["tmp", "bin", "internal/repository"]
  include_ext = ["go", "yaml", "sql"]
  stop_on_error = true

[log]
  time = true
