# Dynamic Traefik config — middleware chains, TLS options, etc.
# Service-level routing lives on container labels in docker-compose.yml.

http:
  middlewares:
    # Apply to public-facing routers via:
    #   traefik.http.routers.<name>.middlewares=secure-headers@file
    secure-headers:
      headers:
        frameDeny: true
        contentTypeNosniff: true
        browserXssFilter: true
        referrerPolicy: "strict-origin-when-cross-origin"
        stsSeconds: 31536000
        stsIncludeSubdomains: true
        stsPreload: true
        customResponseHeaders:
          X-Robots-Tag: "noindex, nofollow"   # set per-route in prod

    # Generous default; tune per-route for /upload and /auth.
    rate-limit:
      rateLimit:
        average: 100
        burst: 200
        period: 1s

    cors-default:
      headers:
        accessControlAllowOriginList:
          - "https://portal.localhost"
        accessControlAllowMethods:
          - GET
          - POST
          - PUT
          - PATCH
          - DELETE
          - OPTIONS
        accessControlAllowHeaders:
          - Authorization
          - Content-Type
          - X-Requested-With
        accessControlMaxAge: 86400
        addVaryHeader: true

tls:
  options:
    default:
      minVersion: VersionTLS12
      sniStrict: true
      cipherSuites:
        - TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256
        - TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256
        - TLS_ECDHE_ECDSA_WITH_AES_256_GCM_SHA384
        - TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384
        - TLS_ECDHE_ECDSA_WITH_CHACHA20_POLY1305
        - TLS_ECDHE_RSA_WITH_CHACHA20_POLY1305
