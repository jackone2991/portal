# Portal — local development compose.
# Production overlays should live in docker-compose.prod.yml.
#
# Bring up infrastructure only:    docker compose up -d postgres pgbouncer dragonfly minio traefik
# Bring up everything:              docker compose up -d
# View Traefik dashboard:           https://traefik.${APP_DOMAIN}
#
# Note: hostnames inside the compose network match service names below.

name: portal

networks:
  edge:        # external-facing: traefik <-> api/frontend
  internal:    # backend-only: db, cache, storage

volumes:
  postgres_data:
  minio_data:
  traefik_acme:

services:
  # ── Reverse proxy ───────────────────────────────────────────────
  traefik:
    image: traefik:v3.1
    restart: unless-stopped
    command:
      - --configFile=/etc/traefik/traefik.yml
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
      - traefik_acme:/letsencrypt
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - ACME_EMAIL=${ACME_EMAIL}
    labels:
      - traefik.enable=true
      - traefik.http.routers.dashboard.rule=Host(`traefik.${APP_DOMAIN}`)
      - traefik.http.routers.dashboard.service=api@internal
      - traefik.http.routers.dashboard.entrypoints=websecure
      - traefik.http.routers.dashboard.tls.certresolver=letsencrypt
      - traefik.http.routers.dashboard.middlewares=dashboard-auth
      - traefik.http.middlewares.dashboard-auth.basicauth.users=${TRAEFIK_DASHBOARD_AUTH}
    networks: [edge]

  # ── Database ────────────────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [internal]

  pgbouncer:
    image: edoburu/pgbouncer:1.23.1
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB}
      POOL_MODE: ${PGBOUNCER_POOL_MODE}
      MAX_CLIENT_CONN: ${PGBOUNCER_MAX_CLIENT_CONN}
      DEFAULT_POOL_SIZE: ${PGBOUNCER_DEFAULT_POOL_SIZE}
      AUTH_TYPE: scram-sha-256
    depends_on:
      postgres:
        condition: service_healthy
    networks: [internal]

  # ── Cache + queue broker ────────────────────────────────────────
  dragonfly:
    image: docker.dragonflydb.io/dragonflydb/dragonfly:latest
    restart: unless-stopped
    ulimits:
      memlock: -1
    command: ["--logtostderr", "--cluster_mode=emulated"]
    networks: [internal]

  # ── Object storage ──────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    labels:
      - traefik.enable=true
      - traefik.http.routers.minio-console.rule=Host(`minio.${APP_DOMAIN}`)
      - traefik.http.routers.minio-console.entrypoints=websecure
      - traefik.http.routers.minio-console.tls.certresolver=letsencrypt
      - traefik.http.services.minio-console.loadbalancer.server.port=9001
    networks: [edge, internal]

  # ── Application services ────────────────────────────────────────
  api:
    build:
      context: ./backend
      target: api
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      dragonfly:
        condition: service_started
      minio:
        condition: service_started
    labels:
      - traefik.enable=true
      - traefik.http.routers.api.rule=Host(`api.${APP_DOMAIN}`)
      - traefik.http.routers.api.entrypoints=websecure
      - traefik.http.routers.api.tls.certresolver=letsencrypt
      - traefik.http.services.api.loadbalancer.server.port=8080
    networks: [edge, internal]

  worker:
    build:
      context: ./backend
      target: worker
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      dragonfly:
        condition: service_started
      minio:
        condition: service_started
    networks: [internal]

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    env_file: .env
    depends_on:
      - api
    labels:
      - traefik.enable=true
      - traefik.http.routers.frontend.rule=Host(`${APP_DOMAIN}`)
      - traefik.http.routers.frontend.entrypoints=websecure
      - traefik.http.routers.frontend.tls.certresolver=letsencrypt
      - traefik.http.services.frontend.loadbalancer.server.port=3000
    networks: [edge]
